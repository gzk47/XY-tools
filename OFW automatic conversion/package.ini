[国行自动转区]

[虚拟系统 转 国际版 - 点击激活]
try:
  cp ./Data/ovlmenu.ovl /switch/.overlays/
  del ./config.ini
  set-footer "已启用"

[真实系统 转 国际版 - 点击激活]
try:
  cp ./Data/ovlmenu.ovl /switch/.overlays/
  cp ./Data/enable_for_ofw.flag /config/ultrahand/
  del ./config.ini
  set-footer "已启用"

[真实系统转区，可点取消，仅限未重启前有效]
[取消真实系统转区]
  del config/ultrahand/enable_for_ofw.flag
  del ./config.ini

[重启生效]
[立即重启]
reboot

